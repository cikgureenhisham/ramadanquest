<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kuiz Ramadan Comel - PSS Al-Ghazali</title>
    
    <!-- Frameworks & Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
    
    <!-- MediaPipe Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/lucide-static/font/lucide.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');
        
        :root {
            --soft-green: #d1fae5;
            --bright-green: #10b981;
            --pastel-yellow: #fef3c7;
            --kids-font: 'Fredoka', sans-serif;
        }

        body { 
            font-family: var(--kids-font);
            overflow: hidden; 
            background: linear-gradient(135deg, #064e3b 0%, #022c22 100%);
            touch-action: none;
            height: 100vh;
            width: 100vw;
        }
        
        /* Video settings - ensure it fills the background in any orientation */
        #ai-video { 
            transform: scaleX(-1); 
            object-fit: cover;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
            opacity: 0.4;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border: 4px solid #10b981;
            box-shadow: 0 10px 0 rgba(0, 0, 0, 0.1);
        }

        .floating {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        .gemini-glow { 
            box-shadow: 0 0 40px #fbbf24;
            transform: scale(1.02) rotate(-0.5deg);
            border-color: #fbbf24 !important;
            background: #fffbeb !important;
        }

        .hand-pointer {
            position: absolute;
            width: 24px;
            height: 24px;
            background: #fbbf24;
            border: 3px solid white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.5);
        }

        .btn-bubbly {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 6px 0 #047857;
        }

        .btn-bubbly:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #047857;
        }

        .leaderboard-scroll::-webkit-scrollbar { width: 4px; }
        .leaderboard-scroll::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }

        .emoji-pop {
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        .admin-modal {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
        }

        .prize-badge {
            background: linear-gradient(to right, #fbbf24, #f59e0b);
            color: white;
            padding: 1px 6px;
            border-radius: 999px;
            font-size: 7px;
            font-weight: bold;
            display: inline-block;
        }

        .animate-shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        /* Adaptive Layout for Quiz Options */
        .options-container {
            display: flex;
            width: 100%;
            gap: 1rem;
            padding: 0 0.5rem;
        }

        @media (max-aspect-ratio: 1/1) {
            .options-container {
                flex-direction: column;
            }
            .options-container > div {
                width: 100% !important;
            }
        }
    </style>
</head>
<body class="text-emerald-900">

    <div id="app-root" class="h-screen w-screen flex flex-col items-center justify-center relative overflow-hidden">
        <video id="ai-video" playsinline muted autoplay></video>
        <div id="cursor" class="hand-pointer hidden"></div>

        <div id="screen-container" class="z-20 w-full h-full flex flex-col items-center justify-center p-4 text-center">
            <!-- Initial Loading -->
            <div class="glass-panel p-6 rounded-[2.5rem] shadow-2xl">
                <div class="text-4xl mb-3 animate-bounce">🌙</div>
                <h3 class="font-bold text-emerald-800 uppercase tracking-widest text-[10px] italic">Sedia Berpuasa...</h3>
            </div>
        </div>

        <!-- Admin Modal -->
        <div id="adminModal" class="fixed inset-0 z-[150] admin-modal hidden items-center justify-center p-6">
            <div class="bg-white p-6 rounded-[2.5rem] w-full max-w-xs text-center border-8 border-red-500 shadow-2xl emoji-pop">
                <div class="text-3xl mb-3">🔐</div>
                <h3 class="font-bold text-red-600 uppercase text-[10px] mb-3 italic tracking-widest">Kebenaran Guru</h3>
                <p id="deleteTargetText" class="text-[9px] font-bold text-slate-400 mb-3 truncate uppercase"></p>
                <input type="password" id="adminPin" maxlength="4" class="w-full p-3 bg-red-50 border-4 border-red-100 rounded-xl text-center text-xl font-bold tracking-widest outline-none mb-4" placeholder="PIN">
                <div class="flex gap-2">
                    <button onclick="closeAdmin()" class="flex-1 bg-slate-100 text-slate-500 font-bold py-3 rounded-lg uppercase text-[9px]">Batal</button>
                    <button onclick="confirmDelete()" class="flex-1 bg-red-500 text-white font-bold py-3 rounded-lg uppercase text-[9px]">Padam</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; 
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'ramadan-ai-kids-edition';

        let user = null;
        let currentStep = 'loading';
        let studentInfo = { name: '', className: '' };
        let quizSessionQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let isWaiting = false;
        let handDetected = 'none'; 
        let detectionProgress = 0;
        let winnersList = [];
        let othersList = [];
        let pendingDeleteId = null;

        const questionBank = [
            { q: "🌙 Dari segi bahasa, puasa bermaksud apa ya?", o: ["Menahan diri 🛑", "Makan banyak 🍎"], a: 0 },
            { q: "⏰ Masa puasa bermula dari Subuh sehingga...", o: ["Isyak 🌑", "Maghrib 🌅"], a: 1 },
            { q: "⚖️ Apakah hukum puasa Ramadan bagi murid yang mampu?", o: ["Wajib ✅", "Sunat 🌟"], a: 0 },
            { q: "🤲 Niat puasa adalah salah satu daripada...", o: ["Rukun Puasa 🏗️", "Adab Makan 🥣"], a: 0 },
            { q: "🌜 Bilakah waktu paling sesuai kita niat puasa?", o: ["Pagi hari ☀️", "Malam hari 🌙"], a: 1 },
            { q: "❌ Adakah memasukkan guli ke dalam hidung membatalkan puasa?", o: ["Batal 😱", "Tidak Batal 🎈"], a: 0 },
            { q: "😋 Kalau kita terlupa dan termakan aiskrim, puasa kita batal tak?", o: ["Ya, batal 🍦", "Tidak, sah! 😋"], a: 1 },
            { q: "🌴 Sunnah Nabi, kita berbuka dengan apa dahulu?", o: ["Air Gas 🥤", "Buah Kurma 🟤"], a: 1 },
            { q: "🍱 Makan sebelum waktu Subuh dipanggil apa?", o: ["Sahur 🍗", "Iftar 🍲"], a: 0 },
            { q: "🕌 Solat istimewa yang hanya ada di malam Ramadan?", o: ["Tarawih 🌙", "Zohor ☀️"], a: 0 },
            { q: "📖 Membaca Al-Quran bersama rakan-rakan dipanggil...", o: ["Tadarus 📚", "Tazkirah 🎤"], a: 0 },
            { q: "✨ Malam yang lebih baik dari 1000 bulan dipanggil...", o: ["Lailatul Qadar 💎", "Malam Raya 🎆"], a: 0 },
            { q: "💰 Zakat yang wajib dibayar sebelum solat sunat Hari Raya?", o: ["Zakat Fitrah 🪙", "Zakat Emas 💍"], a: 0 },
            { q: "🤒 Orang yang sakit kuat boleh tak tidak berpuasa?", o: ["Boleh (Kena Ganti) 🏥", "Tidak Boleh ❌"], a: 0 },
            { q: "🤫 Mengumpat kawan masa puasa akan menyebabkan...", o: ["Pahala Berkurang 📉", "Pahala Bertambah 📈"], a: 0 },
            { q: "🎊 Lepas habis sebulan Ramadan, kita sambut apa?", o: ["Aidilfitri 🍬", "Aidiladha 🐑"], a: 0 },
            { q: "💖 Puasa mendidik kita supaya lebih bersifat...", o: ["Sabar & Tabah 🧸", "Marah-marah 😡"], a: 0 },
            { q: "🚪 Pintu syurga untuk orang berpuasa namanya...", o: ["Ar-Rayyan 🌈", "Firdaus 🏰"], a: 0 },
            { q: "👹 Apa yang berlaku pada syaitan di bulan Ramadan?", o: ["Kena Ikat/Gari ⛓️", "Bebas Berlari 🏃"], a: 0 },
            { q: "🦷 Adakah memberus gigi membatalkan puasa?", o: ["Tidak Batal 🪥", "Batal Puasa ❌"], a: 0 }
        ];

        async function startApp() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await auth.signInWithCustomToken(__initial_auth_token);
                } else {
                    await auth.signInAnonymously();
                }
                auth.onAuthStateChanged((u) => { 
                    user = u; 
                    if(user) listenToLeaderboard();
                });
                await initAI();
                renderWelcome();
            } catch (e) { renderWelcome(); }
        }

        function listenToLeaderboard() {
            if (!user) return;
            db.collection('artifacts').doc(appId).collection('public').doc('data').collection('winners')
                .onSnapshot((snapshot) => {
                    const allData = snapshot.docs
                        .map(doc => ({ id: doc.id, ...doc.data() }))
                        .sort((a, b) => (a.ts?.seconds || 0) - (b.ts?.seconds || 0));

                    winnersList = allData.filter(d => d.score === 20).slice(0, 100);
                    const winnerIds = new Set(winnersList.map(w => w.id));
                    othersList = allData.filter(d => !winnerIds.has(d.id))
                        .sort((a, b) => b.score - a.score || (a.ts?.seconds || 0) - (b.ts?.seconds || 0));

                    if (currentStep === 'leaderboard') renderLeaderboard();
                }, (error) => console.error(error));
        }

        async function callGemini(prompt, system) {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: system }] }
                    })
                });
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "...";
            } catch (e) { return "Teruskan usaha! 💪"; }
        }

        async function initAI() {
            const video = document.getElementById('ai-video');
            const cursor = document.getElementById('cursor');
            const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
            
            hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.65 });
            hands.onResults(results => {
                if (isWaiting) { cursor.classList.add('hidden'); return; }
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    cursor.classList.remove('hidden');
                    const lm = results.multiHandLandmarks[0];
                    const x = 1 - lm[8].x; 
                    const y = lm[8].y;
                    cursor.style.left = `${x * 100}%`;
                    cursor.style.top = `${y * 100}%`;
                    
                    // Adaptive detection zones based on screen orientation
                    const isPortrait = window.innerHeight > window.innerWidth;
                    if (isPortrait) {
                        // In portrait, we detect vertical regions if stacked, 
                        // but let's stick to horizontal split as it's more intuitive
                        if (x < 0.45) handDetected = 'left';
                        else if (x > 0.55) handDetected = 'right';
                        else handDetected = 'none';
                    } else {
                        if (x < 0.45) handDetected = 'left';
                        else if (x > 0.55) handDetected = 'right';
                        else handDetected = 'none';
                    }
                } else { cursor.classList.add('hidden'); handDetected = 'none'; }
                if (currentStep === 'quiz') { updateUISelection(); handleProgress(); }
            });

            const camera = new Camera(video, {
                onFrame: async () => { if (video.readyState >= 2) await hands.send({image: video}); },
                width: 480, height: 640 
            });
            await camera.start();
        }

        function updateUISelection() {
            const l = document.getElementById('box-left');
            const r = document.getElementById('box-right');
            if (l) l.classList.toggle('gemini-glow', handDetected === 'left');
            if (r) r.classList.toggle('gemini-glow', handDetected === 'right');
        }

        let tick;
        function handleProgress() {
            if ((handDetected === 'left' || handDetected === 'right') && !isWaiting) {
                if (!tick) {
                    tick = setInterval(() => {
                        detectionProgress += 12;
                        const bar = document.getElementById('prog-bar');
                        if (bar) {
                            bar.style.width = `${detectionProgress}%`;
                            if (detectionProgress >= 100) {
                                bar.classList.replace('bg-yellow-400', 'bg-emerald-400');
                                clearInterval(tick); tick = null; processAnswer(); 
                            }
                        }
                    }, 100);
                }
            } else {
                clearInterval(tick); tick = null; detectionProgress = 0;
                const bar = document.getElementById('prog-bar');
                if (bar) {
                    bar.style.width = '0%';
                    bar.classList.add('bg-yellow-400');
                    bar.classList.remove('bg-emerald-400');
                }
            }
        }

        const cont = document.getElementById('screen-container');

        function renderWelcome() {
            currentStep = 'welcome';
            cont.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center w-full max-w-sm floating">
                    <div class="glass-panel p-6 rounded-[3rem] shadow-2xl text-center w-full">
                        <div class="text-5xl mb-4">🌙✨</div>
                        <h1 class="text-xl font-bold text-emerald-950 uppercase leading-tight">KUIZ RAMADAN AI<br><span class="text-[9px] text-emerald-600 tracking-[0.2em] italic font-semibold">PSS Al-Ghazali</span></h1>
                        <div class="mt-8 space-y-3">
                            <button onclick="renderRegister()" class="w-full bg-emerald-500 text-white py-4 rounded-2xl font-bold text-lg btn-bubbly uppercase">Mula Jawab! 🚀</button>
                            <button onclick="renderLeaderboard()" class="w-full bg-yellow-100 text-yellow-700 py-3 rounded-2xl font-bold text-[10px] border-2 border-yellow-200 flex items-center justify-center gap-2 uppercase">
                                <i class="lucide-trophy w-3 h-3"></i> Senarai Juara 🏆
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderLeaderboard() {
            currentStep = 'leaderboard';
            cont.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center w-full max-w-sm">
                    <div class="glass-panel p-4 rounded-[2.5rem] shadow-2xl w-full">
                        <div class="text-2xl mb-1">🏆</div>
                        <h2 class="text-[12px] font-bold uppercase text-emerald-900 mb-3 italic">Pemenang Al-Ghazali</h2>
                        <div class="leaderboard-scroll mb-3 max-h-[50vh] overflow-y-auto px-1">
                            <table class="w-full text-left">
                                <thead class="bg-emerald-500 text-white text-[8px] uppercase sticky top-0 z-10">
                                    <tr>
                                        <th class="p-2 rounded-l-lg text-center">#</th>
                                        <th class="p-2">Murid</th>
                                        <th class="p-2 rounded-r-lg">Skor</th>
                                    </tr>
                                </thead>
                                <tbody class="text-emerald-900 font-semibold text-[10px]">
                                    ${winnersList.length > 0 ? `
                                        <tr class="bg-yellow-50/50"><td colspan="3" class="p-1.5 text-[7px] font-bold text-yellow-600 uppercase italic">🎁 Pemenang Hadiah</td></tr>
                                        ${winnersList.map((winner, i) => `
                                            <tr class="border-b border-yellow-100 cursor-pointer" ondblclick="openAdmin('${winner.id}', '${winner.name}')">
                                                <td class="p-1.5 text-center">⭐</td>
                                                <td class="p-1.5">
                                                    <div class="font-bold uppercase truncate max-w-[100px]">${winner.name}</div>
                                                    <div class="flex items-center gap-1">
                                                        <div class="text-[7px] text-emerald-600 font-bold opacity-70 uppercase">${winner.class}</div>
                                                        <span class="prize-badge">HADIAH</span>
                                                    </div>
                                                </td>
                                                <td class="p-1.5"><span class="bg-yellow-400 text-white px-1.5 py-0.5 rounded-full text-[8px] font-bold">20/20</span></td>
                                            </tr>
                                        `).join('')}
                                    ` : ''}
                                    <tr class="bg-emerald-50/50"><td colspan="3" class="p-1.5 text-[7px] font-bold text-emerald-600 uppercase italic">🌟 Bintang Ramadan</td></tr>
                                    ${othersList.length > 0 ? othersList.map((winner, i) => `
                                        <tr class="border-b border-emerald-50 cursor-pointer" ondblclick="openAdmin('${winner.id}', '${winner.name}')">
                                            <td class="p-1.5 text-center text-slate-400">${i + 1}</td>
                                            <td class="p-1.5">
                                                <div class="font-bold uppercase truncate max-w-[100px] opacity-80">${winner.name}</div>
                                                <div class="text-[7px] text-slate-500 font-bold uppercase">${winner.class}</div>
                                            </td>
                                            <td class="p-1.5"><span class="bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded-full text-[8px] font-bold">${winner.score}/20</span></td>
                                        </tr>
                                    `).join('') : (winnersList.length === 0 ? '<tr><td colspan="3" class="p-6 text-center opacity-50 italic text-[9px]">Tiada rekod...</td></tr>' : '')}
                                </tbody>
                            </table>
                        </div>
                        <button onclick="renderWelcome()" class="w-full bg-emerald-500 text-white py-3 rounded-xl font-bold text-[10px] btn-bubbly uppercase tracking-widest">Balik Menu 🏠</button>
                    </div>
                </div>
            `;
        }

        function openAdmin(id, name) {
            pendingDeleteId = id;
            document.getElementById('deleteTargetText').innerText = `Padam: ${name}`;
            document.getElementById('adminModal').classList.replace('hidden', 'flex');
            document.getElementById('adminPin').value = '';
        }

        function closeAdmin() {
            document.getElementById('adminModal').classList.replace('flex', 'hidden');
            pendingDeleteId = null;
        }

        async function confirmDelete() {
            if (document.getElementById('adminPin').value === '4055') {
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('winners').doc(pendingDeleteId).delete();
                    closeAdmin();
                } catch (e) { }
            } else {
                document.getElementById('adminPin').classList.add('animate-shake');
                setTimeout(() => document.getElementById('adminPin').classList.remove('animate-shake'), 500);
            }
        }

        function renderRegister() {
            currentStep = 'register';
            cont.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center w-full max-w-sm">
                    <div class="glass-panel p-8 rounded-[3rem] shadow-2xl w-full">
                        <div class="text-4xl mb-4">📝</div>
                        <h2 class="text-lg font-bold uppercase text-emerald-900 mb-6 italic">Tulis Nama Awak ✨</h2>
                        <div class="space-y-3 mb-8 text-left">
                            <input id="nameIn" class="w-full p-4 bg-emerald-50 rounded-xl border-2 border-emerald-100 outline-none font-bold text-emerald-800 uppercase text-center text-sm" placeholder="NAMA PENUH">
                            <input id="classIn" class="w-full p-4 bg-emerald-50 rounded-xl border-2 border-emerald-100 outline-none font-bold text-emerald-800 uppercase text-center text-sm" placeholder="KELAS (Cth: 4 AG)">
                        </div>
                        <button onclick="checkAndStart()" class="w-full bg-emerald-500 text-white py-4 rounded-2xl font-bold text-md btn-bubbly uppercase">Jom Mula! 🍭</button>
                    </div>
                </div>
            `;
        }

        async function checkAndStart() {
            const n = document.getElementById('nameIn').value.trim().toUpperCase();
            const c = document.getElementById('classIn').value.trim().toUpperCase();
            if (!n || !c) return;

            const existing = [...winnersList, ...othersList].find(m => m.name === n && m.class === c);
            if (existing) {
                cont.innerHTML = `
                    <div class="glass-panel p-8 rounded-[3rem] shadow-2xl text-center border-4 border-yellow-400 max-w-xs m-auto">
                        <div class="text-5xl mb-3">✋🛑</div>
                        <h2 class="text-md font-bold text-emerald-900 mb-2 uppercase italic">Eh, Sudah Jawab!</h2>
                        <div class="bg-yellow-50 p-4 rounded-2xl mb-6 border-2 border-yellow-100">
                            <p class="text-3xl font-bold text-yellow-600">${existing.score}/20</p>
                        </div>
                        <button onclick="renderWelcome()" class="w-full bg-emerald-500 text-white py-3 rounded-xl font-bold text-[10px] btn-bubbly uppercase">Faham! 👌</button>
                    </div>
                `;
                return;
            }

            studentInfo = { name: n, className: c };
            quizSessionQuestions = [...questionBank].sort(() => 0.5 - Math.random());
            currentIndex = 0; score = 0;
            renderQuiz();
        }

        function renderQuiz() {
            currentStep = 'quiz';
            const q = quizSessionQuestions[currentIndex];
            cont.innerHTML = `
                <div class="w-full h-full flex flex-col justify-between items-center py-4">
                    <div class="glass-panel px-4 py-2 rounded-xl flex gap-4 shadow-lg border-2 border-emerald-400">
                        <p class="font-bold text-[9px] text-emerald-600 uppercase">Q: ${currentIndex + 1}/20</p>
                        <p class="font-bold text-[9px] text-yellow-600 uppercase">⭐: ${score}</p>
                    </div>
                    
                    <div class="glass-panel p-6 rounded-[2.5rem] shadow-xl max-w-sm w-full text-center border-2 border-emerald-100 floating">
                        <h2 class="text-md font-bold text-emerald-950 leading-tight italic">"${q.q}"</h2>
                    </div>

                    <div class="options-container">
                        <div id="box-left" class="glass-panel p-4 rounded-[2rem] flex flex-col items-center justify-center shadow-lg border-2 border-emerald-100 min-h-[100px]">
                            <div class="bg-emerald-500 text-white w-6 h-6 rounded-full flex items-center justify-center mb-2 text-[10px] font-bold">A</div>
                            <p class="font-bold text-[10px] text-emerald-900 leading-tight uppercase">${q.o[0]}</p>
                        </div>
                        <div id="box-right" class="glass-panel p-4 rounded-[2rem] flex flex-col items-center justify-center shadow-lg border-2 border-emerald-100 min-h-[100px]">
                            <div class="bg-emerald-600 text-white w-6 h-6 rounded-full flex items-center justify-center mb-2 text-[10px] font-bold">B</div>
                            <p class="font-bold text-[10px] text-emerald-900 leading-tight uppercase">${q.o[1]}</p>
                        </div>
                    </div>

                    <div class="w-full max-w-[240px] mb-4">
                        <div class="bg-white/50 h-3 rounded-full overflow-hidden border-2 border-white">
                            <div id="prog-bar" class="bg-yellow-400 h-full w-0 transition-all duration-75"></div>
                        </div>
                        <p id="instruction-text" class="text-center text-[8px] font-bold text-white mt-2 uppercase drop-shadow-md italic">🖐️ Lambaian Tangan Di Sini 🖐️</p>
                    </div>
                </div>
            `;
        }

        async function processAnswer() {
            isWaiting = true;
            const selected = handDetected === 'left' ? 0 : 1;
            const q = quizSessionQuestions[currentIndex];
            const isCorrect = selected === q.a;
            if (isCorrect) score++;
            
            const instructionText = document.getElementById('instruction-text');
            if(instructionText) instructionText.innerText = "✨ Sedang Menyemak... ✨";

            const msg = await callGemini(`Soalan: ${q.q}. Jawapan: ${isCorrect ? 'Betul' : 'Salah'}. Beri SATU kata semangat sangat pendek (max 4 patah perkataan) & 1 emoji.`, "Cikgu AI PSS.");
            showFeedback(isCorrect, msg);
        }

        function showFeedback(isCorrect, msg) {
            cont.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center w-full max-w-xs emoji-pop">
                    <div class="glass-panel p-8 rounded-[3.5rem] shadow-2xl text-center border-8 ${isCorrect ? 'border-emerald-400' : 'border-red-400'}">
                        <div class="text-6xl mb-4">${isCorrect ? '✅' : '❌'}</div>
                        <h2 class="text-xl font-bold uppercase mb-3 ${isCorrect ? 'text-emerald-500' : 'text-red-500'} italic">${isCorrect ? 'MANTAP!' : 'ALAMAK!'}</h2>
                        <p class="text-[12px] font-bold text-slate-700 italic mb-6">"${msg}"</p>
                        <button onclick="nextQ()" class="w-full bg-emerald-500 text-white py-4 rounded-2xl font-bold text-[10px] btn-bubbly uppercase tracking-widest">Seterusnya ➡️</button>
                    </div>
                </div>
            `;
        }

        function nextQ() {
            isWaiting = false; currentIndex++;
            if (currentIndex < 20) renderQuiz();
            else finalizeGame();
        }

        async function finalizeGame() {
            currentStep = 'result';
            cont.innerHTML = `<div class="glass-panel p-6 rounded-3xl"><div class="text-3xl animate-bounce mb-2">💾</div><p class="text-[9px] font-bold text-emerald-800 uppercase italic">Menyimpan...</p></div>`;
            
            if (user) {
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('winners').add({
                        name: studentInfo.name, 
                        class: studentInfo.className, 
                        score, 
                        ts: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } catch (e) { }
            }

            const analysis = await callGemini(`Murid skor ${score}/20. Beri gelaran Ramadan (2 patah perkataan).`, "Cikgu AI PSS.");

            cont.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center w-full max-w-xs emoji-pop">
                    <div class="glass-panel p-6 rounded-[3rem] shadow-2xl text-center border-4 border-yellow-400">
                        <div class="text-5xl mb-4">🏆 ${score === 20 ? '🎁' : '⭐'}</div>
                        <div class="bg-emerald-500 text-white p-4 rounded-3xl mb-4 shadow-inner">
                            <p class="text-4xl font-bold">${score}/20</p>
                            <p class="text-[8px] uppercase font-bold">Skor Akhir</p>
                        </div>
                        ${score === 20 ? `<p class="text-[8px] font-bold text-yellow-600 uppercase mb-3 animate-pulse">Layak Hadiah PSS! 🎁</p>` : ''}
                        <p class="text-[9px] font-bold text-emerald-700 uppercase mb-6 italic">Gelaran: <br><span class="text-md text-emerald-900 lowercase font-bold">✨ ${analysis} ✨</span></p>
                        <button onclick="renderWelcome()" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold text-[10px] btn-bubbly uppercase">Selesai 🏠</button>
                    </div>
                </div>
            `;
        }

        window.onload = startApp;
    </script>
</body>
</html>
