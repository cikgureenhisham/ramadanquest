<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kuiz Ramadan AI - PSS Al-Ghazali</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase SDK (Compat version) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <!-- MediaPipe AI Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');
        
        body { 
            font-family: 'Fredoka', sans-serif;
            overflow: hidden; 
            background: #064e3b;
            height: 100dvh; width: 100vw; margin: 0;
        }
        
        #ai-video { 
            transform: scaleX(-1); 
            object-fit: cover;
            width: 100%; height: 100%;
            position: absolute; z-index: 0; opacity: 0.3;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(10px);
            border: 3px solid #10b981;
            border-radius: 1.5rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .hand-pointer {
            position: absolute;
            width: 30px; height: 30px;
            background: #fbbf24;
            border: 3px solid white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.9);
        }

        .gemini-glow { 
            border-color: #fbbf24 !important;
            background: #fffbeb !important;
            transform: scale(1.02);
            box-shadow: 0 0 15px #fbbf24;
        }

        .correct-ans {
            border-color: #22c55e !important;
            background: #f0fdf4 !important;
        }

        .wrong-ans {
            border-color: #ef4444 !important;
            background: #fef2f2 !important;
        }

        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }

        .tab-active {
            background-color: #10b981;
            color: white;
        }
    </style>
</head>
<body>

    <video id="ai-video" playsinline muted autoplay></video>
    <div id="cursor" class="hand-pointer" style="display:none"></div>

    <div id="app-root" class="relative z-10 h-screen w-screen flex flex-col items-center justify-center p-4">
        <div class="glass-panel p-8 text-center">
            <h2 class="text-lg font-bold text-emerald-800 animate-pulse uppercase">🌙 Menyiapkan Kuiz...</h2>
        </div>
    </div>

    <script>
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'kuiz-ramadan-alghazali';
        const firebaseConfig = JSON.parse(__firebase_config);
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const scoresCollectionPath = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('scores');

        const questionBank = [
            { q: "🌙 Maksud puasa dari segi bahasa ialah?", a: "Menahan diri 🛑", b: "Makan banyak 🍎", correct: 'left', info: "Puasa bermaksud menahan diri daripada makan, minum dan perkara yang membatalkan puasa." },
            { q: "⏰ Bila kita mula berpuasa setiap hari?", a: "Waktu Zohor ☀️", b: "Waktu Subuh 🌅", correct: 'right', info: "Puasa bermula dari terbit fajar (Subuh) sehingga terbenam matahari (Maghrib)." },
            { q: "⚖️ Apakah hukum puasa Ramadan bagi umat Islam?", a: "Wajib ✅", b: "Sunat ✨", correct: 'left', info: "Puasa Ramadan adalah salah satu daripada Rukun Islam yang wajib dilaksanakan." },
            { q: "🌅 Berbuka puasa apabila masuk waktu apa?", a: "Asar 🌤️", b: "Maghrib 🌙", correct: 'right', info: "Waktu berbuka puasa ditandai dengan azan Maghrib." },
            { q: "🕌 Solat sunat yang hanya ada pada malam Ramadan?", a: "Tarawih 🛐", b: "Dhuha ☀️", correct: 'left', info: "Solat Tarawih adalah solat sunat khusus yang dilakukan pada malam bulan Ramadan sahaja." },
            { q: "🍗 Makan sebelum waktu Subuh dipanggil apa?", a: "Iftar 🍲", b: "Sahur 🥛", correct: 'right', info: "Sahur dilakukan sebelum Subuh untuk memberi tenaga semasa berpuasa." },
            { q: "🍦 Adakah makan secara sengaja membatalkan puasa?", a: "Ya, Batal! 😱", b: "Tidak Batal 😋", correct: 'left', info: "Makan atau minum secara sengaja membatalkan puasa, namun jika terlupa ia tidak batal." },
            { q: "📖 Membaca Al-Quran beramai-ramai dipanggil?", a: "Tadarus 📚", b: "Tazkirah 🎤", correct: 'left', info: "Tadarus adalah aktiviti membaca dan menyemak Al-Quran secara bergilir-gilir." },
            { q: "✨ Malam yang lebih baik dari 1000 bulan ialah?", a: "Malam Jumaat 🕋", b: "Lailatul Qadar 💎", correct: 'right', info: "Lailatul Qadar berlaku pada 10 malam terakhir Ramadan." },
            { q: "🌴 Sunnah Nabi, kita berbuka dengan buah apa?", a: "Buah Kurma 🟤", b: "Buah Epal 🍎", correct: 'left', info: "Berbuka dengan kurma adalah sunnah Nabi Muhammad SAW kerana ia membekalkan tenaga segera." },
            { q: "💰 Zakat yang wajib dibayar pada bulan Ramadan?", a: "Zakat Fitrah 🪙", b: "Zakat Harta 💎", correct: 'left', info: "Zakat Fitrah wajib dibayar oleh setiap muslim yang mampu sebelum solat sunat Aidilfitri." },
            { q: "🎊 Selepas sebulan puasa, kita sambut apa?", a: "Aidiladha 🐑", b: "Aidilfitri 🍬", correct: 'right', info: "Aidilfitri disambut pada 1 Syawal sebagai kemenangan setelah sebulan berpuasa." },
            { q: "🛑 Perkara yang membatalkan puasa ialah?", a: "Muntah Sengaja 🤮", b: "Tidur Siang 😴", correct: 'left', info: "Muntah dengan sengaja membatalkan puasa. Tidur tidak membatalkan puasa." },
            { q: "🚪 Nama pintu syurga untuk orang berpuasa?", a: "Ar-Rayyan 🌈", b: "Firdaus 🏰", correct: 'left', info: "Ar-Rayyan adalah pintu khusus di syurga yang hanya boleh dimasuki oleh orang yang berpuasa." },
            { q: "🧸 Puasa mengajar kita sifat apa?", a: "Sabar & Jujur ❤️", b: "Cepat Marah 😡", correct: 'left', info: "Puasa melatih jiwa untuk bersabar menahan nafsu dan jujur dalam amalan." },
            { q: "⛓️ Apa terjadi kepada syaitan pada bulan Ramadan?", a: "Kena Ikat ⛓️", b: "Bebas Berlari 🏃", correct: 'left', info: "Hadis menyatakan pada bulan Ramadan pintu syurga dibuka dan syaitan dirantai/diikat." },
            { q: "🤒 Orang yang uzur/sakit boleh tidak puasa?", a: "Boleh (Kena Ganti) 🏥", b: "Tetap Wajib ❌", correct: 'left', info: "Islam memberi kemudahan kepada orang sakit untuk berbuka dan menggantinya pada hari lain." },
            { q: "🦷 Adakah memberus gigi membatalkan puasa?", a: "Tidak Batal 🪥", b: "Batal Puasa ❌", correct: 'left', info: "Memberus gigi tidak membatalkan puasa asalkan air atau ubat gigi tidak ditelan masuk ke dalam halkum." },
            { q: "🙊 Mengumpat kawan masa puasa akan menyebabkan?", a: "Pahala Berkurang 📉", b: "Puasa Batal 😱", correct: 'left', info: "Mengumpat tidak membatalkan puasa secara sah tetapi menghilangkan pahala puasa tersebut." },
            { q: "🥤 Niat puasa dilakukan pada waktu bila?", a: "Malam hari 🌙", b: "Tengahari ☀️", correct: 'left', info: "Niat puasa Ramadan wajib dilakukan pada waktu malam sebelum masuk waktu Subuh." }
        ];

        let currentIdx = 0;
        let score = 0;
        let progress = 0;
        let selectedHand = 'none';
        let studentName = "";
        let studentClass = "";
        let historyData = [];
        let isChecking = false;
        let currentTab = 'register'; // 'register' atau 'history'

        window.onload = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await auth.signInWithCustomToken(__initial_auth_token);
                } else {
                    await auth.signInAnonymously();
                }
                auth.onAuthStateChanged((user) => { if (user) fetchHistory(); });
                renderUI();
            } catch (err) { console.error("Auth Error:", err); }
        };

        function fetchHistory() {
            scoresCollectionPath.onSnapshot(snap => {
                const allData = snap.docs.map(doc => doc.data());
                historyData = allData.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                if (currentTab === 'history') updateHistoryDisplay();
            });
        }

        function renderUI() {
            const root = document.getElementById('app-root');
            root.innerHTML = `
                <div class="glass-panel p-6 text-center max-w-sm w-full shadow-2xl flex flex-col min-h-[500px] max-h-[90vh]">
                    <!-- Header -->
                    <div class="mb-4">
                        <h1 class="text-2xl font-bold text-emerald-900 uppercase tracking-tight">🌙 Kuiz Ramadan AI</h1>
                        <p class="text-emerald-600 font-bold text-[10px] tracking-widest uppercase">PSS AL-GHAZALI</p>
                    </div>

                    <!-- Tabs Button -->
                    <div class="flex bg-emerald-100 p-1 rounded-xl mb-6">
                        <button onclick="switchTab('register')" id="tab-reg" class="flex-1 py-2 text-xs font-bold rounded-lg transition-all ${currentTab === 'register' ? 'tab-active shadow-sm' : 'text-emerald-700'}">DAFTAR</button>
                        <button onclick="switchTab('history')" id="tab-hist" class="flex-1 py-2 text-xs font-bold rounded-lg transition-all ${currentTab === 'history' ? 'tab-active shadow-sm' : 'text-emerald-700'}">REKOD & LENCANA</button>
                    </div>

                    <!-- Content Area -->
                    <div id="tab-content" class="flex-1 flex flex-col overflow-hidden">
                        ${currentTab === 'register' ? renderRegisterTab() : renderHistoryTab()}
                    </div>
                </div>
            `;
        }

        function renderRegisterTab() {
            return `
                <div class="flex flex-col justify-center h-full space-y-4 animate-fadeIn">
                    <div class="text-center mb-2">
                        <p class="text-emerald-800 text-sm font-medium">Sila masukkan maklumat anda untuk memulakan kuiz.</p>
                    </div>
                    <!-- Auto-uppercase inputs -->
                    <input id="in-name" type="text" placeholder="Nama Penuh Murid" oninput="this.value = this.value.toUpperCase()" class="w-full p-4 rounded-xl border-2 border-emerald-100 focus:border-emerald-500 outline-none text-sm shadow-sm uppercase">
                    <input id="in-class" type="text" placeholder="Kelas (cth: 6 ARIF)" oninput="this.value = this.value.toUpperCase()" class="w-full p-4 rounded-xl border-2 border-emerald-100 focus:border-emerald-500 outline-none text-sm shadow-sm uppercase">
                    <button id="btn-start" onclick="checkDuplicateAndStart()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all uppercase tracking-widest">Mula Kuiz 🚀</button>
                    <div id="error-msg" class="text-red-500 text-[10px] font-bold hidden bg-red-50 p-2 rounded border border-red-100 uppercase"></div>
                </div>
            `;
        }

        function renderHistoryTab() {
            const winners = historyData.filter(d => d.score === 20).slice(0, 100);
            return `
                <div class="flex flex-col h-full overflow-hidden animate-fadeIn text-left">
                    <!-- Section Lencana -->
                    <div class="mb-4">
                        <div class="flex items-center gap-2 mb-2 text-emerald-800 border-b border-emerald-100 pb-1">
                            <span class="text-lg">🏆</span>
                            <h3 class="text-xs font-black uppercase tracking-tight">Pemenang Lencana (Top 100)</h3>
                        </div>
                        <div class="max-h-32 overflow-y-auto custom-scroll space-y-1 mb-2 pr-1" id="winners-list">
                            ${winners.length > 0 ? winners.map((w, i) => `
                                <div class="flex items-center justify-between bg-yellow-50 p-2 rounded-lg border border-yellow-200 shadow-sm">
                                    <div class="truncate pr-2">
                                        <p class="text-[10px] font-bold text-emerald-900 truncate leading-none mb-1 uppercase">${i+1}. ${w.name}</p>
                                        <p class="text-[8px] text-emerald-600 uppercase font-bold">${w.class}</p>
                                    </div>
                                    <span class="text-[10px] font-black text-yellow-600 bg-white px-2 py-0.5 rounded-full border border-yellow-100 shadow-xs">20/20</span>
                                </div>
                            `).join('') : '<p class="text-[9px] text-emerald-500 italic p-2">Belum ada pemenang 100%.</p>'}
                        </div>
                    </div>

                    <!-- Section Sejarah -->
                    <div class="flex-1 flex flex-col overflow-hidden">
                        <div class="flex items-center justify-between mb-2 text-emerald-800 border-b border-emerald-100 pb-1">
                            <h3 class="text-xs font-black uppercase tracking-tight">Rekod Keseluruhan</h3>
                            <span class="text-[9px] font-bold bg-emerald-200 text-emerald-700 px-2 py-0.5 rounded-full">${historyData.length}</span>
                        </div>
                        <div class="flex-1 overflow-y-auto custom-scroll space-y-1.5 pr-1" id="history-full-list">
                            ${historyData.map(l => `
                                <div class="flex items-center justify-between bg-white p-2 rounded-lg border border-emerald-50 shadow-sm">
                                    <div class="truncate flex-1">
                                        <p class="text-[10px] font-bold text-emerald-900 truncate leading-none mb-1 uppercase">${l.name}</p>
                                        <p class="text-[8px] text-emerald-500 font-bold uppercase">${l.class}</p>
                                    </div>
                                    <span class="text-[10px] font-bold ${l.score >= 15 ? 'text-emerald-600' : 'text-orange-400'}">${l.score}/20</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        function switchTab(tab) {
            currentTab = tab;
            renderUI();
        }

        function updateHistoryDisplay() {
            const content = document.getElementById('tab-content');
            if (content) content.innerHTML = renderHistoryTab();
        }

        async function checkDuplicateAndStart() {
            // Force uppercase one last time during collection
            studentName = document.getElementById('in-name').value.trim().toUpperCase();
            studentClass = document.getElementById('in-class').value.trim().toUpperCase();
            
            const btn = document.getElementById('btn-start');
            const errEl = document.getElementById('error-msg');

            if(!studentName || !studentClass) {
                errEl.innerText = "Sila isi nama dan kelas!";
                errEl.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = `<span class="inline-block animate-spin mr-2">⏳</span> MENYEMAK...`;
            errEl.classList.add('hidden');

            try {
                const snapshot = await scoresCollectionPath.get();
                const exists = snapshot.docs.some(doc => {
                    const d = doc.data();
                    return d.name.toUpperCase() === studentName && 
                           d.class.toUpperCase() === studentClass;
                });

                if (exists) {
                    errEl.innerText = "MAAF, REKOD NAMA & KELAS INI SUDAH WUJUD.";
                    errEl.classList.remove('hidden');
                    btn.disabled = false;
                    btn.innerText = "Mula Kuiz 🚀";
                } else {
                    startQuiz();
                }
            } catch (err) {
                errEl.innerText = "Ralat pangkalan data.";
                errEl.classList.remove('hidden');
                btn.disabled = false;
                btn.innerText = "Mula Kuiz 🚀";
            }
        }

        function startQuiz() {
            document.getElementById('app-root').innerHTML = `
                <div id="quiz-ui" class="w-full h-full flex flex-col items-center justify-between py-6 px-4">
                    <div class="glass-panel px-5 py-2 shadow-md">
                        <span id="q-count" class="font-bold text-emerald-700 text-sm">Soalan 1/20</span>
                    </div>
                    <div class="glass-panel p-5 w-full max-w-md text-center shadow-xl">
                        <h2 id="q-text" class="text-lg font-bold text-emerald-950 leading-tight"></h2>
                    </div>
                    <div class="options-container flex flex-col sm:flex-row gap-3 w-full max-w-md">
                        <div id="box-left" class="option-box glass-panel flex-1 p-4 text-center border-4 transition-all">
                            <div class="bg-emerald-500 text-white w-8 h-8 rounded-full mx-auto mb-2 flex items-center justify-center font-bold text-sm">A</div>
                            <p id="opt-a" class="font-bold text-emerald-900 text-base"></p>
                        </div>
                        <div id="box-right" class="option-box glass-panel flex-1 p-4 text-center border-4 transition-all">
                            <div class="bg-emerald-500 text-white w-8 h-8 rounded-full mx-auto mb-2 flex items-center justify-center font-bold text-sm">B</div>
                            <p id="opt-b" class="font-bold text-emerald-900 text-base"></p>
                        </div>
                    </div>
                    <div class="flex flex-col items-center gap-2">
                        <p id="hint-text" class="text-[10px] text-white/80 font-bold uppercase tracking-widest">Kekalkan tangan pada pilihan</p>
                        <div class="w-48 bg-white/30 h-4 rounded-full border border-white/50 overflow-hidden">
                            <div id="prog-bar" class="bg-yellow-400 h-full w-0 transition-all"></div>
                        </div>
                    </div>
                    <!-- Feedback Modal -->
                    <div id="feedback-modal" class="fixed inset-0 z-50 flex items-center justify-center p-6 hidden bg-black/40 backdrop-blur-sm">
                        <div class="glass-panel p-6 max-w-sm w-full text-center modal-enter">
                            <h2 id="fb-icon" class="text-5xl mb-3"></h2>
                            <h3 id="fb-title" class="text-2xl font-bold mb-2"></h3>
                            <p id="fb-info" class="text-emerald-900 text-sm mb-6 leading-relaxed"></p>
                            <button onclick="nextQuestion()" class="w-full bg-emerald-500 text-white font-bold py-3 rounded-xl uppercase shadow-md">Teruskan ✨</button>
                        </div>
                    </div>
                </div>
            `;
            paparSoalan();
            mulakanAI();
        }

        function paparSoalan() {
            const data = questionBank[currentIdx];
            document.getElementById('q-count').innerText = `Soalan ${currentIdx + 1}/20`;
            document.getElementById('q-text').innerText = data.q;
            document.getElementById('opt-a').innerText = data.a;
            document.getElementById('opt-b').innerText = data.b;
            progress = 0;
            isChecking = false;
            document.getElementById('prog-bar').style.width = '0%';
            document.getElementById('feedback-modal').classList.add('hidden');
            document.getElementById('box-left').className = "option-box glass-panel flex-1 p-4 text-center border-4 transition-all";
            document.getElementById('box-right').className = "option-box glass-panel flex-1 p-4 text-center border-4 transition-all";
            updateHighlight();
        }

        async function mulakanAI() {
            const video = document.getElementById('ai-video');
            const cursor = document.getElementById('cursor');
            try {
                const hands = new window.Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
                hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.5 });
                hands.onResults(results => {
                    if (isChecking) return;
                    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                        cursor.style.display = 'block';
                        const lm = results.multiHandLandmarks[0][8]; 
                        const x = (1 - lm.x) * window.innerWidth;
                        const y = lm.y * window.innerHeight;
                        cursor.style.left = x + 'px'; cursor.style.top = y + 'px';
                        const ratioX = 1 - lm.x;
                        if (ratioX < 0.45) selectedHand = 'left';
                        else if (ratioX > 0.55) selectedHand = 'right';
                        else selectedHand = 'none';
                        updateHighlight();
                        if (selectedHand !== 'none') {
                            progress += 4;
                            document.getElementById('prog-bar').style.width = progress + '%';
                            if (progress >= 100) semakJawapan();
                        } else {
                            progress = 0;
                            document.getElementById('prog-bar').style.width = '0%';
                        }
                    } else {
                        cursor.style.display = 'none'; selectedHand = 'none'; updateHighlight();
                    }
                });
                const camera = new window.Camera(video, { onFrame: async () => { await hands.send({image: video}); }, width: 640, height: 480 });
                camera.start();
            } catch (err) { console.error(err); }
        }

        function updateHighlight() {
            const bl = document.getElementById('box-left');
            const br = document.getElementById('box-right');
            if(!bl || !br) return;
            bl.classList.toggle('gemini-glow', selectedHand === 'left');
            br.classList.toggle('gemini-glow', selectedHand === 'right');
        }

        function semakJawapan() {
            if (isChecking) return;
            isChecking = true;
            const currentQuestion = questionBank[currentIdx];
            const isCorrect = selectedHand === currentQuestion.correct;
            
            document.getElementById(selectedHand === 'left' ? 'box-left' : 'box-right').classList.add(isCorrect ? 'correct-ans' : 'wrong-ans');
            if(!isCorrect) document.getElementById(currentQuestion.correct === 'left' ? 'box-left' : 'box-right').classList.add('correct-ans');

            document.getElementById('fb-icon').innerText = isCorrect ? '✅' : '❌';
            document.getElementById('fb-title').innerText = isCorrect ? 'Tahniah! Betul' : 'Aduh! Salah';
            document.getElementById('fb-title').className = isCorrect ? 'text-2xl font-bold mb-2 text-emerald-600' : 'text-2xl font-bold mb-2 text-red-600';
            document.getElementById('fb-info').innerText = currentQuestion.info;
            
            if (isCorrect) score++;

            setTimeout(() => {
                document.getElementById('feedback-modal').classList.remove('hidden');
            }, 500);
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx < 20) {
                paparSoalan();
            } else {
                tamatKuiz();
            }
        }

        async function tamatKuiz() {
            if (auth.currentUser) {
                await scoresCollectionPath.add({
                    name: studentName, class: studentClass, score: score,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    userId: auth.currentUser.uid
                });
            }
            const isWinner = score === 20;
            document.getElementById('app-root').innerHTML = `
                <div class="glass-panel p-8 text-center max-w-sm w-full shadow-2xl">
                    <h2 class="text-5xl mb-3">${isWinner ? '🏆' : '⭐'}</h2>
                    <h3 class="text-xl font-bold text-emerald-900 uppercase tracking-tight">${isWinner ? 'Tahniah! Skor Penuh' : 'Bintang Ramadan'}</h3>
                    <p class="text-4xl font-bold text-emerald-600 my-4">${score}/20</p>
                    <button onclick="location.reload()" class="w-full bg-emerald-500 text-white font-bold py-4 rounded-xl uppercase shadow-md tracking-widest">Balik ke Mula 🏠</button>
                </div>
            `;
        }
    </script>
</body>
</html>
